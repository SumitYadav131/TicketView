<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>ViewMe - Exact Seat Preview</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      #info {
        position: absolute;
        bottom: 15px;
        left: 15px;
        background: rgba(0, 0, 0, 0.7);
        color: #ff8c00;
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 12px;
        z-index: 10;
        pointer-events: none;
        font-family: monospace;
      }

      .controls-hint {
        position: absolute;
        top: 15px;
        right: 15px;
        background: rgba(0, 0, 0, 0.5);
        color: #ccc;
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 10px;
        z-index: 10;
        pointer-events: none;
      }

      .seat-badge {
        position: absolute;
        top: 15px;
        left: 15px;
        background: rgba(0, 0, 0, 0.7);
        color: #ff8c00;
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 14px;
        font-weight: bold;
        z-index: 10;
        pointer-events: none;
        border-left: 3px solid #ff8c00;
      }
    </style>
  </head>
  <body>
    <div class="seat-badge" id="seatBadge">📍 Section -- | Row --</div>
    <div class="controls-hint">🖱️ Drag to look around | Scroll to zoom</div>
    <div id="info">ViewMe Tickets | Exact Seat Preview</div>
